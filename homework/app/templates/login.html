{% extends "base.html" %}
{% block content %}
<main class="auth-card">
    <div class="brand">LocalGPT</div>
    <h1>Sign in</h1>
    <p class="muted">Use password login or GitHub OAuth.</p>
    {% if request.query_params.get('error') %}
    <div class="alert">Wrong login or password.</div>
    {% endif %}
    <form method="post" action="/auth/ui/login" class="form">
        <label>Login<input name="login" required minlength="3" autocomplete="username"></label>
        <label>Password<input name="password" type="password" required minlength="6" autocomplete="current-password"></label>
        <button type="submit">Sign in</button>
    </form>
    <a class="github" href="/auth/github/login">Continue with GitHub</a>
    <p class="switch">No account? <a href="/register">Create one</a></p>
</main>
{% endblock %}
